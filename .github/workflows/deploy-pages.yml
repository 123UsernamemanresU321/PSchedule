name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compute Pages base path
        shell: bash
        run: |
          OWNER_LOWER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "${REPO_NAME}" = "${OWNER_LOWER}.github.io" ]; then
            echo "PAGES_BASE_PATH=" >> "${GITHUB_ENV}"
          else
            echo "PAGES_BASE_PATH=/${REPO_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run lint
          npm run typecheck

      - name: Build static site
        run: npm run build:pages
        env:
          PAGES_BASE_PATH: ${{ env.PAGES_BASE_PATH }}

      - name: Disable Jekyll
        run: touch .next-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.next-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
